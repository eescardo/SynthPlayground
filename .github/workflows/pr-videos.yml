name: PR Videos

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to capture"
        required: true
        type: string
      scenarios:
        description: "Comma-separated scenarios or 'all' from the shared video scenario set"
        required: true
        default: "all"
        type: string
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  pr-context:
    name: Resolve PR Context
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.pr.outputs.pr_number }}
      head_sha: ${{ steps.pr.outputs.head_sha }}
      head_ref: ${{ steps.pr.outputs.head_ref }}
      scenarios: ${{ steps.scenarios.outputs.value }}
      resolved: ${{ steps.scenarios.outputs.resolved }}
      display: ${{ steps.scenarios.outputs.display }}
    steps:
      - name: Load PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.eventName === "workflow_dispatch"
              ? Number(core.getInput("pr_number", { required: true }))
              : context.payload.pull_request.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            core.setOutput("pr_number", String(pr.number));
            core.setOutput("head_sha", pr.head.sha);
            core.setOutput("head_ref", pr.head.ref);

      - name: Normalize scenarios
        id: scenarios
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            while IFS= read -r line; do
              echo "$line" >> "$GITHUB_OUTPUT"
            done < <(node --import tsx scripts/video-scenarios-cli.ts github-output-input "${{ github.event.inputs.scenarios }}")
          else
            while IFS= read -r line; do
              echo "$line" >> "$GITHUB_OUTPUT"
            done < <(node --import tsx scripts/video-scenarios-cli.ts github-output-labels ${{ join(github.event.pull_request.labels.*.name, ' ') }})
          fi

      - name: Validate scenario selection
        if: steps.scenarios.outputs.error != ''
        shell: bash
        run: |
          echo "${{ steps.scenarios.outputs.error }}"
          exit 1

  capture-after:
    name: Capture PR Videos
    runs-on: ubuntu-latest
    needs: pr-context
    if: needs.pr-context.outputs.scenarios != ''
    outputs:
      artifact_url: ${{ steps.upload.outputs.artifact-url }}
    steps:
      - name: Check out PR head revision
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.pr-context.outputs.head_sha }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Capture videos
        env:
          VIDEO_LABEL: after
          RESOLVED_SCENARIOS: ${{ needs.pr-context.outputs.resolved }}
        shell: bash
        run: |
          IFS=',' read -ra SCENARIOS <<< "$RESOLVED_SCENARIOS"
          node --import tsx scripts/ui-videos/capture.ts "${SCENARIOS[@]}"

      - name: Upload after videos
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ needs.pr-context.outputs.pr_number }}-videos-after
          path: artifacts/videos/after/
          if-no-files-found: error
          retention-days: 14

  publish-previews:
    name: Publish Video Previews
    runs-on: ubuntu-latest
    needs:
      - pr-context
      - capture-after
    if: needs.pr-context.outputs.scenarios != ''
    outputs:
      preview_branch: ${{ steps.publish.outputs.preview_branch }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download after videos
        uses: actions/download-artifact@v4
        with:
          name: pr-${{ needs.pr-context.outputs.pr_number }}-videos-after
          path: ${{ runner.temp }}/videos-after

      - name: Publish preview videos to branch
        id: publish
        env:
          PREVIEW_BRANCH: pr-video-previews
          PR_NUMBER: ${{ needs.pr-context.outputs.pr_number }}
          AFTER_DIR: ${{ runner.temp }}/videos-after
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin "$PREVIEW_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$PREVIEW_BRANCH"
            git switch --create "$PREVIEW_BRANCH" --track "origin/$PREVIEW_BRANCH" 2>/dev/null || git switch "$PREVIEW_BRANCH"
            git reset --hard "origin/$PREVIEW_BRANCH"
          else
            git switch --orphan "$PREVIEW_BRANCH"
            git rm -rf . >/dev/null 2>&1 || true
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          fi

          mkdir -p "pr-$PR_NUMBER"
          rm -rf "pr-$PR_NUMBER"/*
          cp -R "$AFTER_DIR"/. "pr-$PR_NUMBER/"
          touch .nojekyll

          git add .nojekyll "pr-$PR_NUMBER"
          if git diff --cached --quiet; then
            echo "preview_branch=$PREVIEW_BRANCH" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "Update PR $PR_NUMBER video previews"
          git push origin "$PREVIEW_BRANCH"
          echo "preview_branch=$PREVIEW_BRANCH" >> "$GITHUB_OUTPUT"

  skip:
    name: Skip Video Run
    runs-on: ubuntu-latest
    needs: pr-context
    if: needs.pr-context.outputs.scenarios == ''
    steps:
      - name: No video labels present
        run: echo "No video labels selected; skipping video capture."

  comment:
    name: Comment On PR
    runs-on: ubuntu-latest
    needs:
      - pr-context
      - capture-after
      - publish-previews
    if: needs.pr-context.outputs.scenarios != ''
    steps:
      - name: Upsert video comment
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ needs.pr-context.outputs.pr_number }}
          SCENARIOS: ${{ needs.pr-context.outputs.display }}
          RESOLVED_SCENARIOS: ${{ needs.pr-context.outputs.resolved }}
          HEAD_REF: ${{ needs.pr-context.outputs.head_ref }}
          AFTER_URL: ${{ needs.capture-after.outputs.artifact_url }}
          PREVIEW_BRANCH: ${{ needs.publish-previews.outputs.preview_branch }}
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            const marker = "<!-- pr-videos -->";
            const repo = `${context.repo.owner}/${context.repo.repo}`;
            const previewBranch = process.env.PREVIEW_BRANCH;
            const scenarios = process.env.RESOLVED_SCENARIOS.split(",").filter(Boolean);
            const previewUrl = (scenario) =>
              `https://github.com/${repo}/raw/${previewBranch}/pr-${prNumber}/${scenario}.webm`;
            const rows = scenarios
              .map(
                (scenario) =>
                  `| \`${scenario}\` | [view hosted preview](${previewUrl(scenario)}) |`
              )
              .join("\n");
            const body = `${marker}
            ## Videos

            Generated PR-head video captures for ${process.env.SCENARIOS}.

            | Scenario | After (${process.env.HEAD_REF}) |
            | --- | --- |
            ${rows}

            Artifact downloads:

            - After artifact: [download](${process.env.AFTER_URL})

            Artifact contents are organized as:

            - \`artifacts/videos/after/<scenario>.webm\`

            Hosted preview files are published to the \`pr-video-previews\` utility branch for lightweight review links.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
