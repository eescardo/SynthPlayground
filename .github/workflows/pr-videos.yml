name: PR Videos

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to capture"
        required: true
        type: string
      scenarios:
        description: "Comma-separated scenarios or 'all' from the shared video scenario set"
        required: true
        default: "all"
        type: string
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled

permissions:
  contents: write
  issues: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  pr-context:
    name: Resolve PR Context
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.pr.outputs.pr_number }}
      head_sha: ${{ steps.pr.outputs.head_sha }}
      head_ref: ${{ steps.pr.outputs.head_ref }}
      scenarios: ${{ steps.scenarios.outputs.value }}
      resolved: ${{ steps.scenarios.outputs.resolved }}
      display: ${{ steps.scenarios.outputs.display }}
    steps:
      - name: Load PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.eventName === "workflow_dispatch"
              ? Number(core.getInput("pr_number", { required: true }))
              : context.payload.pull_request.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            core.setOutput("pr_number", String(pr.number));
            core.setOutput("head_sha", pr.head.sha);
            core.setOutput("head_ref", pr.head.ref);

      - name: Check out workflow sources
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Normalize scenarios
        id: scenarios
        shell: bash
        env:
          WORKFLOW_SCENARIOS: ${{ github.event.inputs.scenarios }}
          PR_LABELS_JSON: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            node --import tsx scripts/video-scenarios-cli.ts github-output-input "$WORKFLOW_SCENARIOS" >> "$GITHUB_OUTPUT"
          else
            node --import tsx scripts/video-scenarios-cli.ts github-output-labels-json "$PR_LABELS_JSON" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate scenario selection
        if: steps.scenarios.outputs.error != ''
        shell: bash
        run: |
          echo "${{ steps.scenarios.outputs.error }}"
          exit 1

  capture-after:
    name: Capture PR Videos
    runs-on: ubuntu-latest
    needs: pr-context
    if: needs.pr-context.outputs.scenarios != ''
    outputs:
      artifact_url: ${{ steps.upload.outputs.artifact-url }}
    steps:
      - name: Check out PR head revision
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.pr-context.outputs.head_sha }}
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Capture videos
        env:
          VIDEO_LABEL: after
          RESOLVED_SCENARIOS: ${{ needs.pr-context.outputs.resolved }}
        shell: bash
        run: |
          IFS=',' read -ra SCENARIOS <<< "$RESOLVED_SCENARIOS"
          node --import tsx scripts/ui-videos/capture.ts "${SCENARIOS[@]}"

      - name: Upload after videos
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ needs.pr-context.outputs.pr_number }}-videos-after
          path: artifacts/videos/after/
          if-no-files-found: error
          retention-days: 14

  prepare-pages-content:
    name: Prepare Video Preview Site
    runs-on: ubuntu-latest
    needs:
      - pr-context
      - capture-after
    if: needs.pr-context.outputs.scenarios != ''
    outputs:
      preview_branch: ${{ steps.prepare.outputs.preview_branch }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download after videos
        uses: actions/download-artifact@v4
        with:
          name: pr-${{ needs.pr-context.outputs.pr_number }}-videos-after
          path: ${{ runner.temp }}/videos-after

      - name: Prepare preview site content
        id: prepare
        env:
          PREVIEW_BRANCH: pr-video-previews
          PR_NUMBER: ${{ needs.pr-context.outputs.pr_number }}
          AFTER_DIR: ${{ runner.temp }}/videos-after
          RESOLVED_SCENARIOS: ${{ needs.pr-context.outputs.resolved }}
          SITE_DIR: ${{ runner.temp }}/pages-site
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          SOURCE_DIR="$RUNNER_TEMP/video-pages-source"
          rm -rf "$SOURCE_DIR" "$SITE_DIR"
          mkdir -p "$SOURCE_DIR/pr-$PR_NUMBER" "$SITE_DIR"
          cp -R "$AFTER_DIR"/. "$SOURCE_DIR/pr-$PR_NUMBER/"
          VIDEO_PAGES_DIR="$SOURCE_DIR/pr-$PR_NUMBER" node scripts/ui-videos/generate-pages-site.mjs
          touch "$SOURCE_DIR/.nojekyll"

          if git ls-remote --exit-code --heads origin "$PREVIEW_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$PREVIEW_BRANCH"
            git switch --create "$PREVIEW_BRANCH" --track "origin/$PREVIEW_BRANCH" 2>/dev/null || git switch "$PREVIEW_BRANCH"
            git reset --hard "origin/$PREVIEW_BRANCH"
          else
            git switch --orphan "$PREVIEW_BRANCH"
            git rm -rf . >/dev/null 2>&1 || true
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          fi

          mkdir -p "pr-$PR_NUMBER"
          rm -rf "pr-$PR_NUMBER"/*
          cp -R "$SOURCE_DIR"/. .

          git add .nojekyll "pr-$PR_NUMBER"
          if git diff --cached --quiet; then
            echo "preview_branch=$PREVIEW_BRANCH" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update PR $PR_NUMBER video previews"
            git push origin "$PREVIEW_BRANCH"
            echo "preview_branch=$PREVIEW_BRANCH" >> "$GITHUB_OUTPUT"
          fi

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec cp -R {} "$SITE_DIR"/ \;

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ runner.temp }}/pages-site

  deploy-pages:
    name: Deploy Video Preview Pages
    runs-on: ubuntu-latest
    needs:
      - pr-context
      - prepare-pages-content
    if: needs.pr-context.outputs.scenarios != ''
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  skip:
    name: Skip Video Run
    runs-on: ubuntu-latest
    needs: pr-context
    if: needs.pr-context.outputs.scenarios == ''
    steps:
      - name: No video labels present
        run: echo "No video labels selected; skipping video capture."

  comment:
    name: Comment On PR
    runs-on: ubuntu-latest
    needs:
      - pr-context
      - capture-after
      - prepare-pages-content
      - deploy-pages
    if: needs.pr-context.outputs.scenarios != ''
    steps:
      - name: Upsert video comment
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ needs.pr-context.outputs.pr_number }}
          SCENARIOS: ${{ needs.pr-context.outputs.display }}
          RESOLVED_SCENARIOS: ${{ needs.pr-context.outputs.resolved }}
          HEAD_REF: ${{ needs.pr-context.outputs.head_ref }}
          AFTER_URL: ${{ needs.capture-after.outputs.artifact_url }}
          PAGES_URL: ${{ needs.deploy-pages.outputs.page_url }}
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            const marker = "<!-- pr-videos -->";
            const scenarios = process.env.RESOLVED_SCENARIOS.split(",").filter(Boolean);
            const pagesUrl = (process.env.PAGES_URL || "").replace(/\/$/, "");
            const videoPageUrl = (scenario) =>
              `${pagesUrl}/pr-${prNumber}/${scenario}.html`;
            const posterUrl = (scenario) =>
              `${pagesUrl}/pr-${prNumber}/${scenario}.png`;
            const rows = scenarios
              .map(
                (scenario) =>
                  `| \`${scenario}\` | [<img src="${posterUrl(scenario)}" alt="${scenario} video poster" width="360" />](${videoPageUrl(scenario)}) |`
              )
              .join("\n");
            const body = `${marker}
            ## Videos

            Generated PR-head video captures for ${process.env.SCENARIOS}.

            | Scenario | After (${process.env.HEAD_REF}) |
            | --- | --- |
            ${rows}

            Artifact downloads:

            - After artifact: [download](${process.env.AFTER_URL})

            Artifact contents are organized as:

            - \`artifacts/videos/after/<scenario>.webm\`
            - \`artifacts/videos/after/<scenario>.png\`

            Hosted preview files are published through GitHub Pages. Click any thumbnail above to open the player page in a new tab.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
