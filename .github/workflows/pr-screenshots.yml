name: PR Screenshots

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to compare"
        required: true
        type: string
      scenarios:
        description: "Comma-separated scenarios or 'all' (main-view, help-modal, record-mode, patch-editor)"
        required: true
        default: "all"
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  pr-context:
    name: Resolve PR Context
    runs-on: ubuntu-latest
    outputs:
      base_sha: ${{ steps.pr.outputs.base_sha }}
      head_sha: ${{ steps.pr.outputs.head_sha }}
      base_ref: ${{ steps.pr.outputs.base_ref }}
      head_ref: ${{ steps.pr.outputs.head_ref }}
      scenarios: ${{ steps.scenarios.outputs.value }}
      grep: ${{ steps.scenarios.outputs.grep }}
    steps:
      - name: Load PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number(core.getInput("pr_number", { required: true }));
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            core.setOutput("base_sha", pr.base.sha);
            core.setOutput("head_sha", pr.head.sha);
            core.setOutput("base_ref", pr.base.ref);
            core.setOutput("head_ref", pr.head.ref);

      - name: Normalize scenarios
        id: scenarios
        shell: bash
        run: |
          RAW_INPUT="${{ github.event.inputs.scenarios }}"
          NORMALIZED="$(echo "$RAW_INPUT" | tr '[:upper:]' '[:lower:]' | tr ',' '\n' | sed 's/^ *//; s/ *$//' | sed '/^$/d' | sort -u | paste -sd',' -)"
          if [[ -z "$NORMALIZED" || "$NORMALIZED" == "all" ]]; then
            echo "value=all" >> "$GITHUB_OUTPUT"
            echo "grep=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          GREP_PATTERN="$(echo "$NORMALIZED" | tr ',' '\n' | sed 's#^#@#' | paste -sd'|' -)"
          echo "value=$NORMALIZED" >> "$GITHUB_OUTPUT"
          echo "grep=$GREP_PATTERN" >> "$GITHUB_OUTPUT"

  capture-before:
    name: Capture Before Screenshots
    runs-on: ubuntu-latest
    needs: pr-context
    outputs:
      artifact_url: ${{ steps.upload.outputs.artifact-url }}
    steps:
      - name: Check out base revision
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.pr-context.outputs.base_sha }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Capture screenshots
        env:
          SCREENSHOT_LABEL: before
          GREP_PATTERN: ${{ needs.pr-context.outputs.grep }}
        shell: bash
        run: |
          if [[ -n "$GREP_PATTERN" ]]; then
            pnpm exec playwright test tests/ui/screenshot-scenarios.spec.ts --grep "$GREP_PATTERN"
          else
            pnpm run test:ui:capture
          fi

      - name: Upload before screenshots
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ github.event.inputs.pr_number }}-screenshots-before
          path: artifacts/screenshots/before/
          if-no-files-found: error
          retention-days: 14

  capture-after:
    name: Capture After Screenshots
    runs-on: ubuntu-latest
    needs: pr-context
    outputs:
      artifact_url: ${{ steps.upload.outputs.artifact-url }}
    steps:
      - name: Check out PR head revision
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.pr-context.outputs.head_sha }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Capture screenshots
        env:
          SCREENSHOT_LABEL: after
          GREP_PATTERN: ${{ needs.pr-context.outputs.grep }}
        shell: bash
        run: |
          if [[ -n "$GREP_PATTERN" ]]; then
            pnpm exec playwright test tests/ui/screenshot-scenarios.spec.ts --grep "$GREP_PATTERN"
          else
            pnpm run test:ui:capture
          fi

      - name: Upload after screenshots
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ github.event.inputs.pr_number }}-screenshots-after
          path: artifacts/screenshots/after/
          if-no-files-found: error
          retention-days: 14

  comment:
    name: Comment On PR
    runs-on: ubuntu-latest
    needs:
      - pr-context
      - capture-before
      - capture-after
    steps:
      - name: Upsert screenshot comment
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
          SCENARIOS: ${{ needs.pr-context.outputs.scenarios }}
          BASE_REF: ${{ needs.pr-context.outputs.base_ref }}
          HEAD_REF: ${{ needs.pr-context.outputs.head_ref }}
          BEFORE_URL: ${{ needs.capture-before.outputs.artifact_url }}
          AFTER_URL: ${{ needs.capture-after.outputs.artifact_url }}
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            const marker = "<!-- pr-screenshots -->";
            const scenarios = process.env.SCENARIOS === "all"
              ? "`main-view`, `help-modal`, `record-mode`, `patch-editor`"
              : process.env.SCENARIOS.split(",").map((value) => `\`${value}\``).join(", ");
            const body = `${marker}
            ## Screenshots

            Generated screenshot artifacts for ${scenarios}.

            - Before (${process.env.BASE_REF}): [download artifact](${process.env.BEFORE_URL})
            - After (${process.env.HEAD_REF}): [download artifact](${process.env.AFTER_URL})

            Artifact contents are organized as:

            - \`artifacts/screenshots/before/<scenario>.png\`
            - \`artifacts/screenshots/after/<scenario>.png\`

            These are workflow artifacts rather than committed files, so they will not appear directly in the PR diff.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
