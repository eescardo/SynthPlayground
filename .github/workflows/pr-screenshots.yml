name: PR Screenshots

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to compare"
        required: true
        type: string
      scenarios:
        description: "Comma-separated scenarios or 'all' from the shared screenshot scenario set"
        required: true
        default: "all"
        type: string
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  pr-context:
    name: Resolve PR Context
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.pr.outputs.pr_number }}
      base_sha: ${{ steps.pr.outputs.base_sha }}
      head_sha: ${{ steps.pr.outputs.head_sha }}
      base_ref: ${{ steps.pr.outputs.base_ref }}
      head_ref: ${{ steps.pr.outputs.head_ref }}
      scenarios: ${{ steps.scenarios.outputs.value }}
      resolved: ${{ steps.scenarios.outputs.resolved }}
      grep: ${{ steps.scenarios.outputs.grep }}
      display: ${{ steps.scenarios.outputs.display }}
    steps:
      - name: Load PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.eventName === "workflow_dispatch"
              ? Number(core.getInput("pr_number", { required: true }))
              : context.payload.pull_request.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            core.setOutput("pr_number", String(pr.number));
            core.setOutput("base_sha", pr.base.sha);
            core.setOutput("head_sha", pr.head.sha);
            core.setOutput("base_ref", pr.base.ref);
            core.setOutput("head_ref", pr.head.ref);

      - name: Normalize scenarios
        id: scenarios
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            while IFS= read -r line; do
              echo "$line" >> "$GITHUB_OUTPUT"
            done < <(node --import tsx scripts/screenshot-scenarios-cli.ts github-output-input "${{ github.event.inputs.scenarios }}")
          else
            while IFS= read -r line; do
              echo "$line" >> "$GITHUB_OUTPUT"
            done < <(node --import tsx scripts/screenshot-scenarios-cli.ts github-output-labels ${{ join(github.event.pull_request.labels.*.name, ' ') }})
          fi

      - name: Validate scenario selection
        if: steps.scenarios.outputs.error != ''
        shell: bash
        run: |
          echo "${{ steps.scenarios.outputs.error }}"
          exit 1

  capture-before:
    name: Capture Before Screenshots
    runs-on: ubuntu-latest
    needs: pr-context
    if: needs.pr-context.outputs.scenarios != ''
    outputs:
      artifact_url: ${{ steps.upload.outputs.artifact-url }}
    steps:
      - name: Check out base revision
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.pr-context.outputs.base_sha }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Capture screenshots
        env:
          SCREENSHOT_LABEL: before
          GREP_PATTERN: ${{ needs.pr-context.outputs.grep }}
        shell: bash
        run: |
          if [[ -n "$GREP_PATTERN" ]]; then
            node --import tsx scripts/ui-screenshots/capture.ts $(echo "$GREP_PATTERN" | tr '|' '\n' | sed 's/^@//')
          else
            pnpm run test:ui:capture
          fi

      - name: Upload before screenshots
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ needs.pr-context.outputs.pr_number }}-screenshots-before
          path: artifacts/screenshots/before/
          if-no-files-found: error
          retention-days: 14

  capture-after:
    name: Capture After Screenshots
    runs-on: ubuntu-latest
    needs: pr-context
    if: needs.pr-context.outputs.scenarios != ''
    outputs:
      artifact_url: ${{ steps.upload.outputs.artifact-url }}
    steps:
      - name: Check out PR head revision
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.pr-context.outputs.head_sha }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Capture screenshots
        env:
          SCREENSHOT_LABEL: after
          GREP_PATTERN: ${{ needs.pr-context.outputs.grep }}
        shell: bash
        run: |
          if [[ -n "$GREP_PATTERN" ]]; then
            node --import tsx scripts/ui-screenshots/capture.ts $(echo "$GREP_PATTERN" | tr '|' '\n' | sed 's/^@//')
          else
            pnpm run test:ui:capture
          fi

      - name: Upload after screenshots
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ needs.pr-context.outputs.pr_number }}-screenshots-after
          path: artifacts/screenshots/after/
          if-no-files-found: error
          retention-days: 14

  publish-previews:
    name: Publish Screenshot Previews
    runs-on: ubuntu-latest
    needs:
      - pr-context
      - capture-before
      - capture-after
    if: needs.pr-context.outputs.scenarios != ''
    outputs:
      preview_branch: ${{ steps.publish.outputs.preview_branch }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download before screenshots
        uses: actions/download-artifact@v4
        with:
          name: pr-${{ needs.pr-context.outputs.pr_number }}-screenshots-before
          path: ${{ runner.temp }}/screenshots-before

      - name: Download after screenshots
        uses: actions/download-artifact@v4
        with:
          name: pr-${{ needs.pr-context.outputs.pr_number }}-screenshots-after
          path: ${{ runner.temp }}/screenshots-after

      - name: Publish preview images to branch
        id: publish
        env:
          PREVIEW_BRANCH: pr-screenshot-previews
          PR_NUMBER: ${{ needs.pr-context.outputs.pr_number }}
          BEFORE_DIR: ${{ runner.temp }}/screenshots-before
          AFTER_DIR: ${{ runner.temp }}/screenshots-after
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin "$PREVIEW_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$PREVIEW_BRANCH"
            git switch --create "$PREVIEW_BRANCH" --track "origin/$PREVIEW_BRANCH" 2>/dev/null || git switch "$PREVIEW_BRANCH"
            git reset --hard "origin/$PREVIEW_BRANCH"
          else
            git switch --orphan "$PREVIEW_BRANCH"
            git rm -rf . >/dev/null 2>&1 || true
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          fi

          mkdir -p "pr-$PR_NUMBER/before" "pr-$PR_NUMBER/after"
          rm -rf "pr-$PR_NUMBER/before"/* "pr-$PR_NUMBER/after"/*
          cp -R "$BEFORE_DIR"/. "pr-$PR_NUMBER/before/"
          cp -R "$AFTER_DIR"/. "pr-$PR_NUMBER/after/"
          touch .nojekyll

          git add .nojekyll "pr-$PR_NUMBER"
          if git diff --cached --quiet; then
            echo "preview_branch=$PREVIEW_BRANCH" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "Update PR $PR_NUMBER screenshot previews"
          git push origin "$PREVIEW_BRANCH"
          echo "preview_branch=$PREVIEW_BRANCH" >> "$GITHUB_OUTPUT"

  skip:
    name: Skip Screenshot Run
    runs-on: ubuntu-latest
    needs: pr-context
    if: needs.pr-context.outputs.scenarios == ''
    steps:
      - name: No screenshot labels present
        run: echo "No screenshot labels selected; skipping screenshot capture."

  comment:
    name: Comment On PR
    runs-on: ubuntu-latest
    needs:
      - pr-context
      - capture-before
      - capture-after
      - publish-previews
    if: needs.pr-context.outputs.scenarios != ''
    steps:
      - name: Upsert screenshot comment
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ needs.pr-context.outputs.pr_number }}
          SCENARIOS: ${{ needs.pr-context.outputs.display }}
          RESOLVED_SCENARIOS: ${{ needs.pr-context.outputs.resolved }}
          BASE_REF: ${{ needs.pr-context.outputs.base_ref }}
          HEAD_REF: ${{ needs.pr-context.outputs.head_ref }}
          BEFORE_URL: ${{ needs.capture-before.outputs.artifact_url }}
          AFTER_URL: ${{ needs.capture-after.outputs.artifact_url }}
          PREVIEW_BRANCH: ${{ needs.publish-previews.outputs.preview_branch }}
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            const marker = "<!-- pr-screenshots -->";
            const repo = `${context.repo.owner}/${context.repo.repo}`;
            const previewBranch = process.env.PREVIEW_BRANCH;
            const scenarios = process.env.RESOLVED_SCENARIOS.split(",").filter(Boolean);
            const imageUrl = (phase, scenario) =>
              `https://github.com/${repo}/raw/${previewBranch}/pr-${prNumber}/${phase}/${scenario}.png`;
            const rows = scenarios
              .map(
                (scenario) =>
                  `| \`${scenario}\` | <img src="${imageUrl("before", scenario)}" alt="${scenario} before" width="360" /> | <img src="${imageUrl("after", scenario)}" alt="${scenario} after" width="360" /> |`
              )
              .join("\n");
            const body = `${marker}
            ## Screenshots

            Generated screenshot artifacts for ${process.env.SCENARIOS}.

            | Scenario | Before (${process.env.BASE_REF}) | After (${process.env.HEAD_REF}) |
            | --- | --- | --- |
            ${rows}

            Artifact downloads:

            - Before artifact: [download](${process.env.BEFORE_URL})
            - After artifact: [download](${process.env.AFTER_URL})

            Artifact contents are organized as:

            - \`artifacts/screenshots/before/<scenario>.png\`
            - \`artifacts/screenshots/after/<scenario>.png\`

            These are workflow artifacts rather than committed files, so they will not appear directly in the PR diff.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
