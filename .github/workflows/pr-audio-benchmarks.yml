name: PR Audio Benchmarks

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  benchmark-base:
    name: Benchmark Base
    runs-on: ubuntu-latest
    outputs:
      has_artifact: ${{ steps.base-artifact.outputs.has_artifact }}
    steps:
      - name: Check out base ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run base audio benchmark
        id: run-base
        continue-on-error: true
        env:
          BENCHMARK_GIT_REF: ${{ github.event.pull_request.base.ref }}
          BENCHMARK_GIT_SHA: ${{ github.event.pull_request.base.sha }}
        run: pnpm run benchmark:audio -- --runs 5 --output artifacts/audio-benchmarks/base.json

      - name: Flag base artifact availability
        id: base-artifact
        run: |
          if [ -f artifacts/audio-benchmarks/base.json ]; then
            echo "has_artifact=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_artifact=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload base benchmark artifact
        if: steps.base-artifact.outputs.has_artifact == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: audio-benchmark-base
          path: artifacts/audio-benchmarks/base.json
          if-no-files-found: error

  benchmark-head:
    name: Benchmark Head
    runs-on: ubuntu-latest
    steps:
      - name: Check out head ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run head audio benchmark
        env:
          BENCHMARK_GIT_REF: ${{ github.head_ref }}
          BENCHMARK_GIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: pnpm run benchmark:audio -- --runs 5 --output artifacts/audio-benchmarks/head.json

      - name: Upload head benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: audio-benchmark-head
          path: artifacts/audio-benchmarks/head.json
          if-no-files-found: error

  compare-and-comment:
    name: Compare And Comment
    runs-on: ubuntu-latest
    needs:
      - benchmark-base
      - benchmark-head
    if: always() && needs.benchmark-head.result == 'success'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download base benchmark artifact
        if: needs.benchmark-base.outputs.has_artifact == 'true'
        uses: actions/download-artifact@v4
        with:
          name: audio-benchmark-base
          path: artifacts/audio-benchmarks

      - name: Download head benchmark artifact
        uses: actions/download-artifact@v4
        with:
          name: audio-benchmark-head
          path: artifacts/audio-benchmarks

      - name: Compare benchmark results
        run: |
          if [ "${{ needs.benchmark-base.outputs.has_artifact }}" = "true" ]; then
            pnpm run benchmark:audio:compare -- \
              --base artifacts/audio-benchmarks/base.json \
              --head artifacts/audio-benchmarks/head.json \
              --output artifacts/audio-benchmarks/comparison.json \
              --markdown artifacts/audio-benchmarks/comment.md
          else
            pnpm run benchmark:audio:compare -- \
              --head artifacts/audio-benchmarks/head.json \
              --output artifacts/audio-benchmarks/comparison.json \
              --markdown artifacts/audio-benchmarks/comment.md
          fi

      - name: Upload benchmark comparison artifact
        uses: actions/upload-artifact@v4
        with:
          name: audio-benchmark-comparison
          path: |
            artifacts/audio-benchmarks/head.json
            artifacts/audio-benchmarks/comparison.json
            artifacts/audio-benchmarks/comment.md
          if-no-files-found: error

      - name: Upsert benchmark comment
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const fs = require("node:fs");
            const prNumber = Number(process.env.PR_NUMBER);
            const marker = "<!-- pr-audio-benchmarks -->";
            const markdown = fs.readFileSync("artifacts/audio-benchmarks/comment.md", "utf8");
            const body = `${marker}
            ## Audio Benchmarks

            ${markdown}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
